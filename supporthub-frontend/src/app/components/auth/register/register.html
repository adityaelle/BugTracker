<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>SupportHub</h1>
      <p>Create your client account</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" formControlName="fullName" placeholder="John Doe" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="you@company.com" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Min. 6 characters" />
      </div>

      <div class="form-group">
        <label>Department</label>
        <select formControlName="department">
          <option *ngFor="let d of departments" [value]="d">{{ d }}</option>
        </select>
      </div>

      <div class="alert-error" *ngIf="error">{{ error }}</div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a routerLink="/login">Sign in</a></p>
    </div>
  </div>
</div>
