<div class="page">
  <div class="page-header">
    <h2>QA Dashboard — Tickets Under Testing</h2>
  </div>

  <div class="filters">
    <input type="text" [(ngModel)]="searchTerm" (input)="applyFilters()"
      placeholder="Search tickets..." class="search-input" />
  </div>

  <div class="loading" *ngIf="loading">Loading tickets for testing...</div>
  <div class="empty" *ngIf="!loading && filtered.length === 0">No tickets awaiting QA testing.</div>

  <div class="ticket-table" *ngIf="!loading && filtered.length > 0">
    <table>
      <thead>
        <tr>
          <th>Ticket #</th>
          <th>Title</th>
          <th>Priority</th>
          <th>Assigned Developer</th>
          <th>Client</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let ticket of filtered">
          <td><code>{{ ticket.ticketNumber }}</code></td>
          <td>{{ ticket.title }}</td>
          <td><span [class]="'badge priority-' + ticket.priority.toLowerCase()">{{ ticket.priority }}</span></td>
          <td>{{ ticket.assignedTo?.fullName }}</td>
          <td>{{ ticket.raisedBy?.fullName }}</td>
          <td class="actions">
            <button class="btn-view" (click)="viewTicket(ticket.id)">View</button>
            <button class="btn-pass" (click)="pass(ticket)">Pass</button>
            <button class="btn-fail" (click)="fail(ticket)">Fail</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
