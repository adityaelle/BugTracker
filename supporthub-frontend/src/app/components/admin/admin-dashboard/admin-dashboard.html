<div class="page">
  <div class="page-header">
    <h2>Admin Dashboard</h2>
    <button class="btn-primary" (click)="showCreateForm = !showCreateForm">
      {{ showCreateForm ? 'Cancel' : '+ Create User' }}
    </button>
  </div>

  <div class="form-card" *ngIf="showCreateForm">
    <h3>Create New User</h3>
    <div class="alert-error" *ngIf="createError">{{ createError }}</div>
    <div class="alert-success" *ngIf="createSuccess">{{ createSuccess }}</div>
    <form [formGroup]="createForm" (ngSubmit)="onCreateUser()">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" formControlName="fullName" placeholder="John Doe" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" formControlName="email" placeholder="user@company.com" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" formControlName="password" placeholder="Min 6 characters" />
        </div>
        <div class="form-group">
          <label>Role</label>
          <select formControlName="role">
            <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Department</label>
          <select formControlName="department">
            <option *ngFor="let d of departments" [value]="d">{{ d }}</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-primary">Create User</button>
      </div>
    </form>
  </div>

  <div class="users-table" *ngIf="!loading">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Department</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users">
          <td>{{ user.fullName }}</td>
          <td>{{ user.email }}</td>
          <td><span class="badge role">{{ user.role }}</span></td>
          <td>{{ user.department }}</td>
          <td>
            <span [class]="user.isActive ? 'status-active' : 'status-inactive'">
              {{ user.isActive ? 'Active' : 'Inactive' }}
            </span>
          </td>
          <td>
            <button (click)="toggleActive(user)"
              [class]="user.isActive ? 'btn-deactivate' : 'btn-activate'">
              {{ user.isActive ? 'Deactivate' : 'Activate' }}
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="loading" *ngIf="loading">Loading users...</div>
</div>
